<h1>{{ mensagem }}</h1>

@for (obj of lista; track obj.codigo) {
  <div>
    <h2>{{ obj.nome }}</h2>
    <img src="produto_{{ obj.codigo }}.jpeg" /><br />
    @if (obj.promo < obj.valor) {
      de: <s>R$ {{ obj.valor }}</s
      ><br />
      por: R$ {{ obj.promo }}
    } @else {
      R$ {{ obj.valor }}
    }
    <br />
    @if (obj.quantidade > 0) {
      <button>Comprar</button>
    } @else {
      <b>Sem estoque</b>
    }
  </div>
}
