<h1>{{ mensagem }}</h1>
<div class="row">
  @for (obj of lista; track obj.codigo) {
    <div class="card col-md-3 col-sm-12 col-xl-2" width="400px">
      <h2>{{ obj.nome }}</h2>
      <img
        src="produto_{{ obj.codigo }}.jpeg"
        class="card-img-top"
        (click)="redirecionar(obj)"
      /><br />
      <div class="card-text">
        @if (obj.promo < obj.valor) {
          de: <s>R$ {{ obj.valor }}</s
          ><br />
          por: R$ {{ obj.promo }}
        } @else {
          R$ {{ obj.valor }}
        }
        <br />
        @if (obj.quantidade > 0) {
          <button class="btn btn-outline-success" (click)="adicionarItemCesta(obj)">Comprar</button>
        } @else {
          <b>Sem estoque</b>
        }
      </div>
    </div>
  }
</div>
