<div class="alert alert-warning" *ngIf="mensagem.length > 0">
  {{ mensagem }}
</div>

<table class="table table-stripped" *ngIf="lista.length > 0">
  <thead>
    <tr>
      <th scope="col">#</th>
      <th scope="col">Nome</th>
      <th scope="col">quantidade</th>
      <th scope="col">valor</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let obj of lista; index as i">
      <th scope="row">{{ i + 1 }}</th>
      <td>{{ obj.produto.nome }}</td>
      <td>{{ obj.quantidade }}</td>
      <td>{{ obj.valor }}</td>
    </tr>
  </tbody>
</table>
{{ total }}
<br />
<button class="btn btn-success" *ngIf="lista.length > 0">Gravar pedido</button>
