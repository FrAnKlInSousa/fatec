<div class="row">
  <div class="col-12 display-4">
    {{ obj.nome }}
  </div>
  <div class="col-sm-12 col-md-6">
    <img src="produto_{{ obj.codigo }}.jpeg" class="card-img-top" />
  </div>

  <div class="col-sm-12 col-md-6">
    {{ obj.descritivo }}

    @if (obj.promo < obj.valor) {
      de: <s>R$ {{ obj.valor }} </s> <br />
      por: R$ {{ obj.promo }}
    } @else {
      R$ {{ obj.valor }}
    }
    <br />
    @if (obj.quantidade > 0) {
      <button class="btn btn-outline-success">Comprar</button>
    } @else {
      <b>Sem estoque</b>
    }
  </div>
</div>
